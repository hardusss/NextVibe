# Nginx reverse proxy for tx-indexer
# Copy to: /etc/nginx/sites-available/indexer.nextvibe.io
# Then:    ln -s /etc/nginx/sites-available/indexer.nextvibe.io /etc/nginx/sites-enabled/
#          nginx -t && systemctl reload nginx
#
# SSL: use certbot after DNS points to the server
#   certbot --nginx -d indexer.nextvibe.io

server {
    listen 80;
    server_name indexer.nextvibe.io;

    location / {
        proxy_pass http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Helius webhooks can send larger payloads
        client_max_body_size 10m;
        proxy_read_timeout 60s;
    }
}
